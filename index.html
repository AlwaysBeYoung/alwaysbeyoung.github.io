<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Always Be Young</title>
  <meta name="description" content="Pequeñas herramientas. Grandes ideas.">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      color: #1a1a1a;
      background: #fafaf8;
      min-height: 100dvh;
      padding: 24px;
    }

    /* ── Header: logo left, menu center ── */
    .header{
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1200px;
      margin: 0 auto 48px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .logo{
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      line-height: 1.4;
      color: #999;
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: unset;
      flex-shrink: 0;
    }

    /* ── Category menu ── */
    .menu{
      display: flex;
      gap: 4px;
    }
    .menu-btn{
      padding: 6px 18px;
      border-radius: 20px;
      border: 1px solid transparent;
      background: none;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      color: #999;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.01em;
    }
    .menu-btn:hover{ color: #1a1a1a; }
    .menu-btn.active{
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }
    .menu-sep{
      width: 1px;
      background: #e8e8e8;
      margin: 4px 8px;
    }

    /* ── Grid ── */
    .grid{
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .card{
      display: block;
      text-decoration: none;
      color: inherit;
      transition: opacity 0.3s, transform 0.3s;
    }
    .card.hidden{
      display: none;
    }
    .card:hover .preview{ transform: translateY(-3px); }
    .card:hover .title{ color: #1a1a1a; }

    /* ── Screenshot preview ── */
    .preview{
      width: 100%;
      aspect-ratio: 4/3;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.25s ease;
      border: 1px solid rgba(0,0,0,0.06);
      position: relative;
    }

    /* ── Title below card ── */
    .title{
      display: block;
      margin-top: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #999;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }

    /* ── Golf Bot thumbnail ── */
    .preview-golf{
      background: #1e4620;
      color: #e8d5a0;
      font-size: 10px;
      padding: 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .preview-golf .mini-bar{ display:flex; gap:4px }
    .preview-golf .mini-dot{ width:6px;height:6px;border-radius:50%;background:#e8d5a0;opacity:0.5 }
    .preview-golf .mini-row{
      display:flex; justify-content:space-between; align-items:center;
      padding:4px 6px; background:rgba(255,255,255,0.06); border-radius:3px;
    }
    .preview-golf .mini-label{ font-size:6px;opacity:0.6;text-transform:uppercase }
    .preview-golf .mini-val{ font-size:8px;font-weight:600 }
    .preview-golf .mini-btn{
      margin-top:auto; text-align:center; padding:6px;
      background:rgba(255,255,255,0.12); border-radius:4px;
      font-size:8px; font-weight:700; letter-spacing:0.5px;
    }

    /* ── Calculator thumbnail ── */
    .preview-calc{
      background: #0a0f14;
      color: #e2e8f0;
      font-size: 10px;
      padding: 14px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .preview-calc .mini-score{
      display:flex; align-items:center; gap:8px;
      padding:5px 8px; background:rgba(255,255,255,0.04); border-radius:4px;
    }
    .preview-calc .mini-hole{
      width:18px;height:18px;border-radius:50%;
      background:#22c55e;color:#000;display:flex;align-items:center;justify-content:center;
      font-size:7px;font-weight:900;
    }
    .preview-calc .mini-num{ font-size:14px;font-weight:800;font-variant-numeric:tabular-nums }
    .preview-calc .mini-badge{
      font-size:7px;padding:2px 6px;border-radius:6px;
      background:#14532d;color:#4ade80;
    }
    .preview-calc .mini-grid{
      display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-top:4px;
    }
    .preview-calc .mini-cell{
      aspect-ratio:1;border-radius:2px;background:rgba(255,255,255,0.03);
      display:flex;align-items:center;justify-content:center;font-size:7px;color:#64748b;
    }

    /* ── Sorteo thumbnail ── */
    .preview-sorteo{
      background: #fff;
      border: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: center;
    }
    .preview-sorteo .sorteo-display{ text-align:center }
    .preview-sorteo .sorteo-names{
      font-size:11px;color:#999;margin-bottom:12px;
      display:flex;gap:14px;justify-content:center;
    }
    .preview-sorteo .sorteo-result{
      font-size:32px;font-weight:800;
      color:#1a1a1a;
      animation:mini-bounce 0.8s ease infinite;
    }

    /* ── ¿Qué Palo Uso? thumbnail ── */
    .preview-palo{
      background: #fff;
      border: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 6px;
    }
    .preview-palo .palo-dist{ font-size:40px;font-weight:900;color:#1a1a1a;line-height:1 }
    .preview-palo .palo-club{ font-size:22px;font-weight:800;color:#c2410c }
    .preview-palo .palo-range{ font-size:10px;color:#999 }

    @keyframes mini-bounce{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-8px)}
    }

    /* ── Empty state ── */
    .empty{
      grid-column: 1 / -1;
      text-align: center;
      color: #ccc;
      font-size: 14px;
      padding: 60px 0;
    }

    /* ── Responsive ── */
    @media(max-width:640px){
      body{padding:16px}
      .header{flex-direction:column;align-items:flex-start;margin-bottom:32px}
      .grid{grid-template-columns:1fr;gap:20px}
      .menu{gap:2px;flex-wrap:wrap}
      .menu-btn{font-size:12px;padding:5px 14px}
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="logo">Always Be Young</div>
    <nav class="menu" id="menu">
      <!-- JS auto-populates from data-category attributes -->
    </nav>
  </header>

  <div class="grid" id="grid">

    <!-- ⛳ Golf Bot · Deporte -->
    <a class="card" data-category="deporte" href="https://alwaysbeyoung.github.io/clapphouse-golf-bot/" target="_blank" rel="noopener">
      <div class="preview preview-golf">
        <div class="mini-bar"><span class="mini-dot"></span><span class="mini-dot"></span><span class="mini-dot"></span></div>
        <div class="mini-row"><span class="mini-label">⛳ Lomas Bosque</span><span class="mini-val">Reservas</span></div>
        <div class="mini-row"><span class="mini-label">Junio 2026</span><span class="mini-val">08:00</span></div>
        <div class="mini-row"><span class="mini-label">Recorrido</span><span class="mini-val">TEE 1</span></div>
        <div class="mini-row"><span class="mini-label">Hoyos</span><span class="mini-val">18</span></div>
        <div class="mini-btn">BLOQUEAR</div>
      </div>
      <span class="title">Reserva automática de tee-times</span>
    </a>

    <!-- 🧮 Stableford · Deporte -->
    <a class="card" data-category="deporte" href="/calculadora/" target="_blank" rel="noopener">
      <div class="preview preview-calc">
        <div class="mini-score"><span class="mini-hole">1</span><span class="mini-num">4</span><span class="mini-badge">+2</span></div>
        <div class="mini-score"><span class="mini-hole">2</span><span class="mini-num">5</span><span class="mini-badge">+1</span></div>
        <div class="mini-grid">
          <span class="mini-cell">3</span><span class="mini-cell">5</span><span class="mini-cell">4</span><span class="mini-cell">2</span><span class="mini-cell">6</span>
          <span class="mini-cell">4</span><span class="mini-cell">3</span><span class="mini-cell">5</span><span class="mini-cell">4</span><span class="mini-cell">3</span>
        </div>
      </div>
      <span class="title">Puntuación Stableford · Lomas Bosque</span>
    </a>

    <!-- 🎲 Sorteo · Deporte -->
    <a class="card" data-category="deporte" href="/sorteo/" target="_blank" rel="noopener">
      <div class="preview preview-sorteo">
        <div class="sorteo-display">
          <div class="sorteo-names"><span>Ana</span><span>Luis</span><span>Marta</span><span>Juan</span></div>
          <div class="sorteo-result">🏆</div>
        </div>
      </div>
      <span class="title">Sorteador de salidas al tee</span>
    </a>

    <!-- 🏌️ ¿Qué Palo Uso? · Deporte -->
    <a class="card" data-category="deporte" href="/quepalouso/" target="_blank" rel="noopener">
      <div class="preview preview-palo">
        <div class="palo-dist">150<span style="font-size:16px;font-weight:500;color:#999">m</span></div>
        <div class="palo-club">Hierro 7</div>
        <div class="palo-range">140 – 160 m</div>
      </div>
      <span class="title">Recomendador de palo de golf</span>
    </a>

  </div>

  <script>
    // ── Category system ──
    const CATEGORY_LABELS = {
      deporte: 'Deporte',
      utilidad: 'Utilidad',
      vida: 'Estilo de vida',
      juego: 'Juego',
      herramienta: 'Herramienta',
    };

    const menu = document.getElementById('menu');
    const grid = document.getElementById('grid');
    const cards = grid.querySelectorAll('.card');

    // Collect unique categories from actual cards
    const usedCategories = new Set();
    cards.forEach(c => usedCategories.add(c.dataset.category));

    // Build menu
    let activeCategory = 'todos';

    function buildMenu(){
      menu.innerHTML = '';

      // "Todos" button
      const btnAll = document.createElement('button');
      btnAll.className = 'menu-btn' + (activeCategory === 'todos' ? ' active' : '');
      btnAll.textContent = 'Todos';
      btnAll.addEventListener('click', () => filter('todos'));
      menu.appendChild(btnAll);

      // Separator
      const sep = document.createElement('span');
      sep.className = 'menu-sep';
      menu.appendChild(sep);

      // One button per used category
      [...usedCategories].sort().forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'menu-btn' + (activeCategory === cat ? ' active' : '');
        btn.textContent = CATEGORY_LABELS[cat] || cat;
        btn.addEventListener('click', () => filter(cat));
        menu.appendChild(btn);
      });
    }

    function filter(category){
      activeCategory = category;
      buildMenu();

      let visible = 0;
      cards.forEach(card => {
        if(category === 'todos' || card.dataset.category === category){
          card.classList.remove('hidden');
          visible++;
        } else {
          card.classList.add('hidden');
        }
      });

      // Show empty state if nothing visible
      const existingEmpty = grid.querySelector('.empty');
      if(existingEmpty) existingEmpty.remove();

      if(visible === 0){
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'Próximamente';
        grid.appendChild(empty);
      }
    }

    buildMenu();
  </script>

</body>
</html>
