<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Always Be Young</title>
  <meta name="description" content="Pequeñas herramientas. Grandes ideas.">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased}
    body{
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      color: #1a1a1a;
      background: #fafaf8;
      min-height: 100dvh;
      padding: 24px;
    }

    /* ── Logo ── */
    .logo{
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      line-height: 1;
      color: #999;
      letter-spacing: 0;
      padding: 0;
      margin-bottom: 48px;
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: unset;
    }

    /* ── Grid ── */
    .grid{
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
      max-width: 1200px;
    }

    /* ── Card ── */
    .card{
      display: block;
      text-decoration: none;
      color: inherit;
    }
    .card:hover .preview{ transform: translateY(-3px); }
    .card:hover .title{ color: #1a1a1a; }

    /* ── Screenshot preview ── */
    .preview{
      width: 100%;
      aspect-ratio: 4/3;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.25s ease;
      border: 1px solid rgba(0,0,0,0.06);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    /* ── Title below card ── */
    .title{
      display: block;
      margin-top: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #999;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }

    /* ── Golf Bot thumbnail ── */
    .preview-golf{
      background: #1e4620;
      color: #e8d5a0;
      font-size: 10px;
      padding: 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .preview-golf .mini-bar{ display:flex; gap:4px }
    .preview-golf .mini-dot{ width:6px;height:6px;border-radius:50%;background:#e8d5a0;opacity:0.5 }
    .preview-golf .mini-row{
      display:flex; justify-content:space-between; align-items:center;
      padding:4px 6px; background:rgba(255,255,255,0.06); border-radius:3px;
    }
    .preview-golf .mini-label{ font-size:6px;opacity:0.6;text-transform:uppercase }
    .preview-golf .mini-val{ font-size:8px;font-weight:600 }
    .preview-golf .mini-btn{
      margin-top:auto; text-align:center; padding:6px;
      background:rgba(255,255,255,0.12); border-radius:4px;
      font-size:8px; font-weight:700; letter-spacing:0.5px;
    }

    /* ── Calculator thumbnail ── */
    .preview-calc{
      background: #0a0f14;
      color: #e2e8f0;
      font-size: 10px;
      padding: 14px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .preview-calc .mini-score{
      display:flex; align-items:center; gap:8px;
      padding:5px 8px; background:rgba(255,255,255,0.04); border-radius:4px;
    }
    .preview-calc .mini-hole{
      width:18px;height:18px;border-radius:50%;
      background:#22c55e;color:#000;display:flex;align-items:center;justify-content:center;
      font-size:7px;font-weight:900;
    }
    .preview-calc .mini-num{ font-size:14px;font-weight:800;font-variant-numeric:tabular-nums }
    .preview-calc .mini-badge{
      font-size:7px;padding:2px 6px;border-radius:6px;
      background:#14532d;color:#4ade80;
    }
    .preview-calc .mini-grid{
      display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-top:4px;
    }
    .preview-calc .mini-cell{
      aspect-ratio:1;border-radius:2px;background:rgba(255,255,255,0.03);
      display:flex;align-items:center;justify-content:center;font-size:7px;color:#64748b;
    }

    /* ── Responsive ── */
    @media(max-width:640px){
      body{padding:16px}
      .grid{grid-template-columns:1fr;gap:20px}
      .logo{margin-bottom:32px}
    }
  </style>
</head>
<body>

  <div class="logo">Always Be Young</div>

  <div class="grid">

    <!-- ⛳ Golf Bot -->
    <a class="card" href="https://alwaysbeyoung.github.io/clapphouse-golf-bot/" target="_blank" rel="noopener">
      <div class="preview preview-golf">
        <div class="mini-bar">
          <span class="mini-dot"></span><span class="mini-dot"></span><span class="mini-dot"></span>
        </div>
        <div class="mini-row">
          <span class="mini-label">⛳ Lomas Bosque</span>
          <span class="mini-val">Reservas</span>
        </div>
        <div class="mini-row">
          <span class="mini-label">Junio 2026</span>
          <span class="mini-val">08:00</span>
        </div>
        <div class="mini-row">
          <span class="mini-label">Recorrido</span>
          <span class="mini-val">TEE 1</span>
        </div>
        <div class="mini-row">
          <span class="mini-label">Hoyos</span>
          <span class="mini-val">18</span>
        </div>
        <div class="mini-btn">BLOQUEAR</div>
      </div>
      <span class="title">Reserva automática de tee-times</span>
    </a>

    <!-- 🧮 Stableford Calculator -->
    <a class="card" href="/calculadora/" target="_blank" rel="noopener">
      <div class="preview preview-calc">
        <div class="mini-score">
          <span class="mini-hole">1</span>
          <span class="mini-num">4</span>
          <span class="mini-badge">+2</span>
        </div>
        <div class="mini-score">
          <span class="mini-hole">2</span>
          <span class="mini-num">5</span>
          <span class="mini-badge">+1</span>
        </div>
        <div class="mini-grid">
          <span class="mini-cell">3</span>
          <span class="mini-cell">5</span>
          <span class="mini-cell">4</span>
          <span class="mini-cell">2</span>
          <span class="mini-cell">6</span>
          <span class="mini-cell">4</span>
          <span class="mini-cell">3</span>
          <span class="mini-cell">5</span>
          <span class="mini-cell">4</span>
          <span class="mini-cell">3</span>
        </div>
      </div>
      <span class="title">Puntuación Stableford · Lomas Bosque</span>
    </a>

  </div>

</body>
</html>
