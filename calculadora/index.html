<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Stableford — Real Club de Golf Lomas-Bosque</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --bg: #0a0f14;
      --card: #141c26;
      --card2: #1a2433;
      --border: #263040;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --gold: #fbbf24;
      --green: #4ade80;
      --emerald: #34d399;
      --red: #f87171;
      --orange: #fb923c;
      --accent: #22c55e;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { touch-action: manipulation; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      padding-bottom: env(safe-area-inset-bottom, 20px);
      min-height: 100dvh;
    }
    /* No double-tap zoom on buttons */
    button, .btn-touch {
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .card2 {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .btn-plus, .btn-minus {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 700;
      transition: all 0.12s ease;
      border: 2px solid var(--border);
      background: var(--card2);
      color: var(--text);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-plus:active { background: #166534; border-color: var(--green); transform: scale(0.93); }
    .btn-minus:active { background: #7f1d1d; border-color: var(--red); transform: scale(0.93); }
    .btn-plus { color: var(--green); }
    .btn-minus { color: var(--red); }
    .btn-raya {
      width: 36px; height: 48px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800;
      transition: all 0.12s ease;
      border: 2px solid #4b5563;
      background: var(--card2);
      color: #6b7280;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-raya:active { background: #374151; border-color: #9ca3af; color: #d1d5db; transform: scale(0.93); }
    .btn-raya.active { background: #374151; border-color: #9ca3af; color: #e5e7eb; }
    .score-num {
      font-size: 28px; font-weight: 800;
      min-width: 44px; text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .stableford-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 52px; height: 28px; border-radius: 14px;
      font-size: 13px; font-weight: 700;
      padding: 0 10px;
    }
    .sf-5 { background: #b45309; color: #fde68a; }
    .sf-4 { background: #14532d; color: #86efac; }
    .sf-3 { background: #14532d; color: #4ade80; }
    .sf-2 { background: #1e293b; color: #cbd5e1; }
    .sf-1 { background: #431407; color: #fdba74; }
    .sf-0 { background: #1a1118; color: #f87171; }
    .sf-raya { background: #1f1a28; color: #a78bfa; }
    .sf-null { background: transparent; color: #4b5563; }
    .player-total {
      font-size: 38px; font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .hole-header {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; margin-bottom: 6px;
    }
    .hole-number {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--accent); color: #000;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900;
    }
    .hole-par, .hole-si {
      font-size: 13px; font-weight: 600;
      padding: 4px 10px; border-radius: 8px;
      background: var(--card);
      color: var(--text2);
    }
    .hole-si { color: var(--orange); }
    .strokes-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; margin: 0 1px;
      background: var(--accent);
    }
    .strokes-dot.extra { background: var(--gold); }
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.8);
      display: flex; align-items: flex-end; justify-content: center;
    }
    .modal-sheet {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      width: 100%; max-height: 85dvh;
      overflow-y: auto;
      padding: 20px 16px 36px;
      border-top: 1px solid var(--border);
    }
    .input-field {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
      color: var(--text); font-size: 16px; width: 100%;
      outline: none; transition: border-color 0.2s;
    }
    .input-field:focus { border-color: var(--accent); }
    .btn-primary {
      background: var(--accent); color: #000;
      font-weight: 700; font-size: 15px;
      padding: 12px 20px; border-radius: 12px;
      border: none; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary:active { transform: scale(0.96); opacity: 0.85; }
    .btn-ghost {
      background: transparent; color: var(--text2);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 16px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-ghost:active { background: var(--border); }
    .btn-danger {
      background: transparent; color: var(--red);
      border: 1px solid #7f1d1d; border-radius: 10px;
      padding: 10px 16px; font-size: 14px; font-weight: 600;
      cursor: pointer;
    }
    .btn-danger:active { background: #7f1d1d; }
    .divider {
      height: 1px; background: var(--border);
      margin: 10px 0;
    }
    .net-score {
      font-size: 13px; font-weight: 600;
      color: var(--text2);
    }
    .player-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 14px 6px 8px;
      font-size: 13px; font-weight: 600;
    }
    /* Export image styles — light theme for readability when shared */
    #exportContainer {
      position: fixed; left: -9999px; top: 0; z-index: -1;
      width: 750px;
      background: #ffffff;
      color: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      padding: 32px 28px 28px;
    }
    #exportContainer .exp-header {
      text-align: center; margin-bottom: 22px;
    }
    #exportContainer .exp-header h2 {
      font-size: 22px; font-weight: 800; color: #0f5c2e;
      margin: 0 0 2px;
    }
    #exportContainer .exp-header p {
      font-size: 13px; color: #64748b; margin: 0;
    }
    #exportContainer .exp-summary {
      display: flex; gap: 12px; justify-content: center;
      margin-bottom: 24px; flex-wrap: wrap;
    }
    #exportContainer .exp-summary-card {
      flex: 1; min-width: 150px; max-width: 180px;
      background: #f8fafc; border: 2px solid #e2e8f0;
      border-radius: 14px; padding: 14px; text-align: center;
    }
    #exportContainer .exp-summary-card.leader {
      border-color: #fbbf24; background: #fffbeb;
    }
    #exportContainer .exp-player-name {
      font-size: 15px; font-weight: 700; color: #1e293b;
      margin-bottom: 4px;
    }
    #exportContainer .exp-player-hcp {
      font-size: 11px; color: #94a3b8; margin-bottom: 6px;
    }
    #exportContainer .exp-total-row {
      display: flex; justify-content: center; gap: 16px;
      font-size: 12px; color: #64748b;
    }
    #exportContainer .exp-total-val {
      font-size: 28px; font-weight: 900; color: #0f5c2e;
      line-height: 1.1;
    }
    #exportContainer .exp-total-label {
      font-size: 10px; color: #94a3b8; text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #exportContainer .exp-scorecard {
      margin-bottom: 20px; page-break-inside: avoid;
    }
    #exportContainer .exp-scorecard-title {
      font-size: 15px; font-weight: 700; color: #1e293b;
      margin-bottom: 6px; padding-left: 4px;
      border-left: 4px solid #22c55e; padding: 2px 0 2px 10px;
    }
    #exportContainer table {
      width: 100%; border-collapse: collapse;
      font-size: 12px; font-variant-numeric: tabular-nums;
    }
    #exportContainer th {
      background: #1a1a2e; color: #ffffff;
      padding: 6px 4px; font-size: 11px; font-weight: 700;
      text-align: center; white-space: nowrap;
    }
    #exportContainer td {
      padding: 5px 4px; text-align: center;
      border-bottom: 1px solid #e2e8f0;
    }
    #exportContainer .td-hole { font-weight: 700; color: #0f5c2e; }
    #exportContainer .td-par { color: #64748b; font-weight: 600; }
    #exportContainer .td-si { color: #f59e0b; font-weight: 600; font-size: 10px; }
    #exportContainer .td-gross { font-weight: 700; font-size: 13px; }
    #exportContainer .td-strokes { color: #22c55e; font-weight: 600; font-size: 10px; }
    #exportContainer .td-net { color: #3b82f6; font-weight: 600; }
    #exportContainer .td-sf { font-weight: 700; font-size: 13px; }
    #exportContainer .td-section { font-weight: 800; background: #f8fafc; color: #1e293b; }
    #exportContainer .sf-c5 { color: #d97706; } /* gold */
    #exportContainer .sf-c4 { color: #16a34a; }
    #exportContainer .sf-c3 { color: #22c55e; }
    #exportContainer .sf-c2 { color: #64748b; }
    #exportContainer .sf-c1 { color: #f97316; }
    #exportContainer .sf-c0 { color: #ef4444; }
    #exportContainer .sf-c-raya { color: #a78bfa; }
    #exportContainer .exp-footer {
      text-align: center; margin-top: 20px; padding-top: 16px;
      border-top: 1px solid #e2e8f0;
      font-size: 12px; color: #94a3b8;
    }
    #exportContainer .exp-footer strong {
      color: #64748b;
    }
    .btn-export {
      background: #fbbf24; color: #1a1a2e;
      font-weight: 800; font-size: 14px;
      padding: 10px 18px; border-radius: 12px;
      border: none; cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-export:active { transform: scale(0.95); opacity: 0.8; }
  </style>
</head>
<body class="px-3 pt-3">

  <!-- ═══════════ HEADER ═══════════ -->
  <header class="flex items-center justify-between mb-3">
    <div class="flex items-center gap-3">
      <img src="" id="headerLogo" alt="Logo" class="w-10 h-10 rounded-lg object-contain bg-white/10 p-0.5">
      <div>
        <h1 class="text-base font-bold leading-tight">Lomas-Bosque</h1>
        <p class="text-xs text-slate-400" id="headerSubtitle">Stableford · Par 72 · Barras Blancas</p>
      </div>
    </div>
    <div class="flex items-center gap-1.5">
      <button id="btnExport" class="btn-export hidden text-xs px-3 py-2" aria-label="Exportar imagen">
        📤 Compartir
      </button>
      <button id="btnReset" class="btn-ghost text-xs px-3 py-2" aria-label="Reiniciar" style="color:#f87171;border-color:#7f1d1d;">
        ↺
      </button>
      <span id="resetConfirm" style="display:none;gap:4px;align-items:center;">
        <span class="text-xs text-red-400 font-semibold">¿Seguro?</span>
        <button id="btnResetYes" class="w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold" style="background:#7f1d1d;color:#fca5a5;border:none;">✓</button>
        <button id="btnResetNo" class="w-7 h-7 rounded-full flex items-center justify-center text-sm font-bold" style="background:#1e293b;color:#94a3b8;border:1px solid #334155;">✗</button>
      </span>
      <button id="btnCourseEdit" class="btn-ghost text-xs px-3 py-2" aria-label="Editar campo">
        ⚙️ Campo
      </button>
    </div>
  </header>

  <!-- ═══════════ PLAYER LEADERBOARD ═══════════ -->
  <div id="leaderboard" class="card p-3 mb-3 sticky top-0 z-30" style="backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);">
    <div id="leaderboardContent" class="flex gap-2 overflow-x-auto pb-1">
      <!-- Dynamically filled -->
    </div>
    <div id="noPlayers" class="text-center py-4 text-slate-500 text-sm">
      Añade jugadores para comenzar →
    </div>
    <button id="btnAddPlayer" class="btn-primary w-full mt-2 text-sm py-2.5">
      + Añadir Jugador
    </button>
  </div>

  <!-- ═══════════ 18 HOLE CARDS ═══════════ -->
  <div id="holesContainer" class="space-y-2 mb-6">
    <!-- Dynamically filled -->
  </div>

  <!-- ═══════════ BOTTOM SPACER ═══════════ -->
  <div class="h-6"></div>

  <!-- ═══════════ COURSE EDIT MODAL ═══════════ -->
  <div id="courseModal" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold">Editar Datos del Campo</h2>
        <button id="btnCloseCourse" class="text-slate-400 text-xl leading-none p-2">&times;</button>
      </div>
      <p class="text-xs text-slate-400 mb-3">Ajusta Par o Hándicap de cada hoyo si es necesario.</p>
      <div id="courseEditFields" class="space-y-1 mb-4">
        <!-- Dynamically filled -->
      </div>
      <div class="flex gap-2">
        <button id="btnRestoreCourse" class="btn-ghost flex-1">↺ Restaurar Original</button>
        <button id="btnSaveCourse" class="btn-primary flex-1">Guardar Cambios</button>
      </div>
    </div>
  </div>

  <!-- ═══════════ PLAYER EDIT MODAL ═══════════ -->
  <div id="playerModal" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold" id="playerModalTitle">Añadir Jugador</h2>
        <button id="btnClosePlayer" class="text-slate-400 text-xl leading-none p-2">&times;</button>
      </div>
      <div class="space-y-3 mb-4">
        <div>
          <label class="text-xs text-slate-400 block mb-1">Nombre del Jugador</label>
          <input id="inputPlayerName" type="text" class="input-field" placeholder="Ej: Alonso" maxlength="20">
        </div>
        <div>
          <label class="text-xs text-slate-400 block mb-1">Hándicap de Juego <span class="text-slate-500">(Course Handicap)</span></label>
          <input id="inputPlayerHcp" type="number" class="input-field" placeholder="Ej: 12.4" step="0.1" min="0" max="54" inputmode="decimal">
        </div>
      </div>
      <div class="flex gap-2">
        <button id="btnRemovePlayer" class="btn-danger flex-1 hidden">🗑 Eliminar Jugador</button>
        <button id="btnSavePlayer" class="btn-primary flex-1">Guardar</button>
      </div>
    </div>
  </div>

  <!-- ═══════════ FOOTER ACTIONS ═══════════ -->
  <div class="fixed bottom-4 right-4 z-20 flex flex-col gap-2">
    <button id="btnExportFloating" class="w-11 h-11 rounded-full bg-amber-500/80 border border-amber-400 text-amber-900 flex items-center justify-center text-lg hidden" aria-label="Exportar">
      📤
    </button>
  </div>

  <!-- ═══════════ EXPORT IMAGE CONTAINER (hidden, offscreen) ═══════════ -->
  <div id="exportContainer"></div>

  // ═══════════════════════════════════
  //  STATE MANAGEMENT
  // ═══════════════════════════════════
  const LS_COURSE_KEY = 'golf_lomasbosque_course';
  const LS_PLAYERS_KEY = 'golf_lomasbosque_players';

  let course = loadCourse();
  let players = loadPlayers();
  let editingPlayerIndex = -1; // -1 = new player

  function loadCourse() {
    try {
      const raw = localStorage.getItem(LS_COURSE_KEY);
      if (raw) {
        const c = JSON.parse(raw);
        c.totalPar = c.holes.reduce((s, h) => s + h.par, 0);
        return c;
      }
    } catch (e) { /* ignore */ }
    return JSON.parse(JSON.stringify(DEFAULT_COURSE));
  }

  function saveCourse() {
    localStorage.setItem(LS_COURSE_KEY, JSON.stringify(course));
  }

  function loadPlayers() {
    try {
      const raw = localStorage.getItem(LS_PLAYERS_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) { /* ignore */ }
    return [];
  }

  function savePlayers() {
    localStorage.setItem(LS_PLAYERS_KEY, JSON.stringify(players));
  }

  // ═══════════════════════════════════
  //  STABLEFORD CALCULATIONS
  // ═══════════════════════════════════

  /** How many strokes a player receives on a given hole based on course handicap */
  function strokesOnHole(courseHandicap, strokeIndex) {
    const hcp = Math.round(courseHandicap);
    let strokes = Math.floor(hcp / 18);
    if (strokeIndex <= (hcp % 18)) strokes += 1;
    return strokes;
  }

  /** Net score = gross - strokes received */
  function netScore(gross, courseHandicap, strokeIndex) {
    if (gross === null || gross === undefined || gross === '') return null;
    return gross - strokesOnHole(courseHandicap, strokeIndex);
  }

  /** Stableford points from net score vs par */
  function stablefordPoints(gross, par, courseHandicap, strokeIndex) {
    if (gross === null || gross === undefined || gross === '') return null;
    const net = gross - strokesOnHole(courseHandicap, strokeIndex);
    const diff = net - par;
    if (diff <= -3) return 5; // Albatross or better
    if (diff === -2) return 4; // Eagle
    if (diff === -1) return 3; // Birdie
    if (diff === 0)  return 2; // Par
    if (diff === 1)  return 1; // Bogey
    return 0;                  // Double bogey or worse
  }

  /** Total Stableford points for a player across all 18 holes */
  function playerTotal(playerIndex) {
    const p = players[playerIndex];
    if (!p) return 0;
    let total = 0;
    for (let i = 0; i < 18; i++) {
      const hole = course.holes[i];
      const s = (p.scores && p.scores[i] != null) ? p.scores[i] : null;
      if (s === -1) { total += 0; continue; } // raya = 0 Stableford points
      const pts = stablefordPoints(s, hole.par, p.courseHandicap, hole.strokeIndex);
      if (pts !== null) total += pts;
    }
    return total;
  }

  function playerGrossTotal(playerIndex) {
    const p = players[playerIndex];
    if (!p || !p.scores) return null;
    let total = 0;
    let anyScore = false;
    for (let i = 0; i < 18; i++) {
      const s = p.scores[i];
      if (s != null && s !== -1) { total += s; anyScore = true; }
    }
    return anyScore ? total : null;
  }

  function playerNetTotal(playerIndex) {
    const p = players[playerIndex];
    if (!p || !p.scores) return null;
    let total = 0;
    let anyScore = false;
    for (let i = 0; i < 18; i++) {
      const hole = course.holes[i];
      const gross = p.scores[i];
      if (gross != null && gross !== -1) {
        total += netScore(gross, p.courseHandicap, hole.strokeIndex);
        anyScore = true;
      }
    }
    return anyScore ? total : null;
  }

  function holesPlayed(playerIndex) {
    const p = players[playerIndex];
    if (!p || !p.scores) return 0;
    return p.scores.filter(s => s != null).length; // includes raya (-1)
  }

  // ═══════════════════════════════════
  //  UI RENDERING
  // ═══════════════════════════════════

  function renderAll() {
    document.getElementById('headerSubtitle').textContent =
      `Stableford · Par ${course.totalPar} · ${course.tees}`;
    renderLeaderboard();
    renderHoles();
    updateExportButtons();
  }

  function renderLeaderboard() {
    const container = document.getElementById('leaderboardContent');
    const noPlayers = document.getElementById('noPlayers');

    if (players.length === 0) {
      container.innerHTML = '';
      noPlayers.classList.remove('hidden');
      return;
    }
    noPlayers.classList.add('hidden');

    // Sort players by Stableford total descending
    const ranked = players.map((p, i) => ({ ...p, index: i, total: playerTotal(i) }))
      .sort((a, b) => b.total - a.total);

    container.innerHTML = ranked.map((p, rank) => {
      const medal = rank === 0 ? '🥇' : rank === 1 ? '🥈' : rank === 2 ? '🥉' : '';
      const total = p.total;
      const grossT = playerGrossTotal(p.index);
      const netT = playerNetTotal(p.index);
      const colorClass = total >= 36 ? 'text-amber-400' :
                         total >= 30 ? 'text-green-400' :
                         total >= 20 ? 'text-white' : 'text-slate-400';
      return `
        <div class="card2 p-2.5 flex-shrink-0 cursor-pointer" style="min-width: 115px;"
             onclick="openPlayerEdit(${p.index})" data-player="${p.index}">
          <div class="flex items-center gap-1 mb-0.5">
            <span class="text-xs font-semibold truncate max-w-[70px]">${medal} ${escHtml(p.name)}</span>
          </div>
          <div class="player-total ${colorClass}">${total}</div>
          <div class="text-[9px] text-slate-500 leading-tight">
            ${grossT !== null ? 'Gross ' + grossT : '—'} · ${netT !== null ? 'Net ' + netT : '—'}
          </div>
          <div class="flex items-center gap-2 text-[10px] text-slate-500 mt-0.5">
            <span>HCP ${p.courseHandicap}</span>
            <span>${holesPlayed(p.index)}/18 hoyos</span>
          </div>
        </div>`;
    }).join('');
  }

  function renderHoles() {
    const container = document.getElementById('holesContainer');
    if (!course || !course.holes) return;

    container.innerHTML = course.holes.map((hole, holeIdx) => {
      const parDots = Array.from({ length: hole.par }, () => '·').join('');
      return `
        <div class="card px-3 py-2.5" data-hole="${hole.number}">
          <div class="hole-header">
            <div class="hole-number">${hole.number}</div>
            <span class="hole-par">Par ${hole.par}</span>
            <span class="hole-si">HCP ${hole.strokeIndex}</span>
            <span class="text-xs text-slate-500 font-mono">${parDots}</span>
          </div>
          ${players.length === 0
            ? '<div class="text-xs text-slate-600 py-2">Añade jugadores para registrar golpes</div>'
            : players.map((p, pi) => renderPlayerHoleRow(p, pi, hole, holeIdx)).join('')
          }
        </div>`;
    }).join('');
  }

  function renderPlayerHoleRow(player, playerIndex, hole, holeIdx) {
    const isRaya = (player.scores && player.scores[holeIdx] === -1);
    const gross = (!isRaya && player.scores && player.scores[holeIdx] != null) ? player.scores[holeIdx] : null;
    const net = gross !== null ? netScore(gross, player.courseHandicap, hole.strokeIndex) : null;
    const pts = isRaya ? 0 : (gross !== null ? stablefordPoints(gross, hole.par, player.courseHandicap, hole.strokeIndex) : null);
    const str = strokesOnHole(player.courseHandicap, hole.strokeIndex);
    const strokesDots = Array.from({ length: Math.min(str, 3) }, (_, i) =>
      `<span class="strokes-dot${i >= 1 ? ' extra' : ''}"></span>`
    ).join('');

    const sfLabel = isRaya ? 'Raya' : (pts === 5 ? 'Albatross' : pts === 4 ? 'Eagle' : pts === 3 ? 'Birdie' :
                    pts === 2 ? 'Par' : pts === 1 ? 'Bogey' : pts === 0 ? 'D.Bogey' : '');
    const sfClass = isRaya ? 'sf-raya' : (pts !== null ? `sf-${pts}` : 'sf-null');
    const sfDisplay = isRaya ? '0 pt' : (pts !== null ? `${pts} pt` : '—');

    const netDisplay = net !== null ? net : '—';
    const grossDisplay = isRaya ? '/' : (gross !== null ? gross : '—');
    const rayaActive = isRaya ? ' active' : '';

    return `
      <div class="flex items-center gap-1.5 py-1" data-hole="${hole.number}" data-player="${playerIndex}">
        <div class="player-chip flex-shrink-0" style="max-width:80px;" onclick="openPlayerEdit(${playerIndex})">
          <span class="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold"
                style="background:${playerColor(playerIndex)};color:#000;">
            ${player.name.charAt(0).toUpperCase()}
          </span>
          <span class="truncate text-[11px]">${escHtml(player.name)}</span>
        </div>
        <div class="text-[10px] text-slate-500 w-7 text-center flex-shrink-0" title="${str} golpe(s) recibido(s)">
          ${strokesDots || '—'}
        </div>
        <button class="btn-minus flex-shrink-0"
                onclick="changeScore(${playerIndex}, ${holeIdx}, -1)"
                aria-label="Restar golpe">−</button>
        <div class="score-num" id="score-${playerIndex}-${holeIdx}">${grossDisplay}</div>
        <button class="btn-plus flex-shrink-0"
                onclick="changeScore(${playerIndex}, ${holeIdx}, 1)"
                aria-label="Sumar golpe">+</button>
        <button class="btn-raya flex-shrink-0${rayaActive}"
                onclick="toggleRaya(${playerIndex}, ${holeIdx})"
                aria-label="Raya (recoger bola)">/</button>
        <div class="flex flex-col items-center flex-shrink-0 min-w-[44px]">
          <span class="net-score">Net ${netDisplay}</span>
          <span class="stableford-badge ${sfClass}">${sfDisplay}${sfLabel ? ' ' + sfLabel : ''}</span>
        </div>
      </div>
      ${playerIndex < players.length - 1 ? '<div class="divider"></div>' : ''}
    `;
  }

  function playerColor(index) {
    const colors = ['#4ade80', '#60a5fa', '#f472b6', '#fbbf24'];
    return colors[index % colors.length];
  }

  /** Update only the score-related elements for one player on one hole */
  function updateScoreDisplay(playerIndex, holeIdx) {
    const hole = course.holes[holeIdx];
    const player = players[playerIndex];
    const isRaya = (player.scores && player.scores[holeIdx] === -1);
    const gross = (!isRaya && player.scores && player.scores[holeIdx] != null) ? player.scores[holeIdx] : null;
    const net = gross !== null ? netScore(gross, player.courseHandicap, hole.strokeIndex) : null;
    const pts = isRaya ? 0 : (gross !== null ? stablefordPoints(gross, hole.par, player.courseHandicap, hole.strokeIndex) : null);

    const sfLabel = isRaya ? 'Raya' : (pts === 5 ? 'Albatross' : pts === 4 ? 'Eagle' : pts === 3 ? 'Birdie' :
                    pts === 2 ? 'Par' : pts === 1 ? 'Bogey' : pts === 0 ? 'D.Bogey' : '');
    const sfClass = isRaya ? 'sf-raya' : (pts !== null ? `sf-${pts}` : 'sf-null');
    const sfDisplay = isRaya ? '0 pt' : (pts !== null ? `${pts} pt` : '—');
    const netDisplay = net !== null ? net : '—';
    const grossDisplay = isRaya ? '/' : (gross !== null ? gross : '—');

    // Update the score number
    const scoreEl = document.getElementById(`score-${playerIndex}-${holeIdx}`);
    if (scoreEl) scoreEl.textContent = grossDisplay;

    // Update raya button state
    const row = document.querySelector(`[data-hole="${hole.number}"][data-player="${playerIndex}"]`);
    if (row) {
      const rayaBtn = row.querySelector('.btn-raya');
      if (rayaBtn) {
        rayaBtn.classList.toggle('active', isRaya);
      }
      const netEl = row.querySelector('.net-score');
      const badgeEl = row.querySelector('.stableford-badge');
      if (netEl) netEl.textContent = `Net ${netDisplay}`;
      if (badgeEl) {
        badgeEl.className = `stableford-badge ${sfClass}`;
        badgeEl.textContent = `${sfDisplay}${sfLabel ? ' ' + sfLabel : ''}`;
      }
    }

    // Update leaderboard
    renderLeaderboard();
    updateExportButtons();
  }

  // ═══════════════════════════════════
  //  RAYA (PICK UP) HANDLER
  // ═══════════════════════════════════

  function toggleRaya(playerIndex, holeIdx) {
    const player = players[playerIndex];
    if (!player) return;

    if (!player.scores) {
      player.scores = new Array(18).fill(null);
    }

    // Toggle raya: if already raya, clear it; otherwise set raya
    if (player.scores[holeIdx] === -1) {
      player.scores[holeIdx] = null;
    } else {
      player.scores[holeIdx] = -1;
    }

    savePlayers();
    updateScoreDisplay(playerIndex, holeIdx);
  }

  // ═══════════════════════════════════
  //  SCORE CHANGE HANDLER
  // ═══════════════════════════════════

  function changeScore(playerIndex, holeIdx, delta) {
    const player = players[playerIndex];
    if (!player) return;

    // Initialize scores array if needed
    if (!player.scores) {
      player.scores = new Array(18).fill(null);
    }

    let current = player.scores[holeIdx];
    if (current === null || current === undefined || current === -1) {
      // Start at par as the natural default (also clears raya)
      current = course.holes[holeIdx].par;
    }

    let newScore = current + delta;
    // Clamp to reasonable golf score range
    if (newScore < 1) newScore = 1;
    if (newScore > 15) newScore = 15;

    player.scores[holeIdx] = newScore;
    savePlayers();
    updateScoreDisplay(playerIndex, holeIdx);
  }

  // ═══════════════════════════════════
  //  PLAYER MANAGEMENT
  // ═══════════════════════════════════

  function openPlayerEdit(index) {
    editingPlayerIndex = index;
    const modal = document.getElementById('playerModal');
    const title = document.getElementById('playerModalTitle');
    const nameInput = document.getElementById('inputPlayerName');
    const hcpInput = document.getElementById('inputPlayerHcp');
    const removeBtn = document.getElementById('btnRemovePlayer');

    if (index >= 0 && index < players.length) {
      title.textContent = 'Editar Jugador';
      nameInput.value = players[index].name;
      hcpInput.value = players[index].courseHandicap;
      removeBtn.classList.remove('hidden');
    } else {
      title.textContent = 'Añadir Jugador';
      nameInput.value = '';
      hcpInput.value = '';
      removeBtn.classList.add('hidden');
    }
    modal.classList.remove('hidden');
    setTimeout(() => nameInput.focus(), 150);
  }

  function savePlayerFromModal() {
    const name = document.getElementById('inputPlayerName').value.trim();
    const hcpRaw = document.getElementById('inputPlayerHcp').value.trim();
    const hcp = hcpRaw === '' ? 0 : parseFloat(hcpRaw);

    if (!name) {
      alert('Por favor, introduce un nombre.');
      return;
    }
    if (isNaN(hcp) || hcp < 0 || hcp > 54) {
      alert('Hándicap debe ser un número entre 0 y 54.');
      return;
    }

    if (editingPlayerIndex >= 0 && editingPlayerIndex < players.length) {
      // Edit existing
      players[editingPlayerIndex].name = name;
      players[editingPlayerIndex].courseHandicap = hcp;
    } else {
      // Add new
      if (players.length >= 4) {
        alert('Máximo 4 jugadores.');
        return;
      }
      players.push({
        id: Date.now(),
        name: name,
        courseHandicap: hcp,
        scores: new Array(18).fill(null),
      });
    }

    savePlayers();
    closePlayerModal();
    renderAll();
  }

  function removePlayerFromModal() {
    if (editingPlayerIndex < 0 || editingPlayerIndex >= players.length) return;
    if (!confirm(`¿Eliminar a "${players[editingPlayerIndex].name}" y todas sus puntuaciones?`)) return;
    players.splice(editingPlayerIndex, 1);
    savePlayers();
    closePlayerModal();
    renderAll();
  }

  function closePlayerModal() {
    document.getElementById('playerModal').classList.add('hidden');
    editingPlayerIndex = -1;
  }

  // ═══════════════════════════════════
  //  COURSE EDIT
  // ═══════════════════════════════════

  function openCourseEdit() {
    const modal = document.getElementById('courseModal');
    const fields = document.getElementById('courseEditFields');

    fields.innerHTML = course.holes.map((hole, i) => `
      <div class="flex items-center gap-2 py-1.5">
        <span class="w-8 text-sm font-bold text-slate-400 text-right">${hole.number}</span>
        <div class="flex items-center gap-1 flex-1">
          <label class="text-[10px] text-slate-500 w-5">Par</label>
          <input type="number" id="editPar${i}" value="${hole.par}"
                 class="input-field py-2 px-2 text-sm text-center" style="width:52px;"
                 min="3" max="6" inputmode="numeric">
        </div>
        <div class="flex items-center gap-1 flex-1">
          <label class="text-[10px] text-slate-500 w-7">HCP</label>
          <input type="number" id="editSI${i}" value="${hole.strokeIndex}"
                 class="input-field py-2 px-2 text-sm text-center" style="width:52px;"
                 min="1" max="18" inputmode="numeric">
        </div>
      </div>
    `).join('');

    modal.classList.remove('hidden');
  }

  function closeCourseEdit() {
    document.getElementById('courseModal').classList.add('hidden');
  }

  function saveCourseEdit() {
    for (let i = 0; i < 18; i++) {
      const par = parseInt(document.getElementById(`editPar${i}`).value);
      const si = parseInt(document.getElementById(`editSI${i}`).value);
      if (isNaN(par) || par < 3 || par > 6) {
        alert(`Hoyo ${i + 1}: Par debe ser 3-6.`);
        return;
      }
      if (isNaN(si) || si < 1 || si > 18) {
        alert(`Hoyo ${i + 1}: Hándicap debe ser 1-18.`);
        return;
      }
      course.holes[i].par = par;
      course.holes[i].strokeIndex = si;
    }
    course.totalPar = course.holes.reduce((s, h) => s + h.par, 0);
    saveCourse();
    closeCourseEdit();
    renderAll();
  }

  function restoreCourse() {
    if (!confirm('¿Restaurar los datos originales del campo? Esto sobrescribirá cualquier cambio.')) return;
    course = JSON.parse(JSON.stringify(DEFAULT_COURSE));
    saveCourse();
    closeCourseEdit();
    renderAll();
  }

  // ═══════════════════════════════════
  //  RESET (two-step header button)
  // ═══════════════════════════════════

  let resetTimer = null;

  function openReset() {
    const btn = document.getElementById('btnReset');
    const confirm = document.getElementById('resetConfirm');
    btn.style.display = 'none';
    confirm.style.display = 'flex';
    // Auto-collapse after 5 seconds
    clearTimeout(resetTimer);
    resetTimer = setTimeout(cancelReset, 5000);
  }

  function confirmReset() {
    clearTimeout(resetTimer);
    players = [];
    savePlayers();
    cancelReset();
    renderAll();
  }

  function cancelReset() {
    clearTimeout(resetTimer);
    document.getElementById('btnReset').style.display = '';
    document.getElementById('resetConfirm').style.display = 'none';
  }

  // ═══════════════════════════════════
  //  UTILS
  // ═══════════════════════════════════

  function escHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ═══════════════════════════════════
  //  EVENT BINDINGS
  // ═══════════════════════════════════

  document.getElementById('btnAddPlayer').addEventListener('click', () => openPlayerEdit(-1));
  document.getElementById('btnSavePlayer').addEventListener('click', savePlayerFromModal);
  document.getElementById('btnRemovePlayer').addEventListener('click', removePlayerFromModal);
  document.getElementById('btnClosePlayer').addEventListener('click', closePlayerModal);
  document.getElementById('playerModal').addEventListener('click', function(e) {
    if (e.target === this) closePlayerModal();
  });

  document.getElementById('btnCourseEdit').addEventListener('click', openCourseEdit);
  document.getElementById('btnCloseCourse').addEventListener('click', closeCourseEdit);
  document.getElementById('btnSaveCourse').addEventListener('click', saveCourseEdit);
  document.getElementById('btnRestoreCourse').addEventListener('click', restoreCourse);
  document.getElementById('courseModal').addEventListener('click', function(e) {
    if (e.target === this) closeCourseEdit();
  });

  document.getElementById('btnReset').addEventListener('click', openReset);
  document.getElementById('btnResetYes').addEventListener('click', confirmReset);
  document.getElementById('btnResetNo').addEventListener('click', cancelReset);

  // Export buttons
  document.getElementById('btnExport').addEventListener('click', exportToImage);
  document.getElementById('btnExportFloating').addEventListener('click', exportToImage);

  // Keyboard: Enter to save in modals
  document.getElementById('inputPlayerName').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') savePlayerFromModal();
  });
  document.getElementById('inputPlayerHcp').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') savePlayerFromModal();
  });

  // ═══════════════════════════════════
  //  EXPORT TO IMAGE
  // ═══════════════════════════════════

  function anyPlayerCompleted() {
    return players.some((p) => holesPlayed(players.indexOf(p)) === 18);
  }

  function updateExportButtons() {
    const show = anyPlayerCompleted();
    document.getElementById('btnExport').classList.toggle('hidden', !show);
    document.getElementById('btnExportFloating').classList.toggle('hidden', !show);
  }

  function buildExportHTML() {
    const now = new Date();
    const dateStr = now.toLocaleDateString('es-ES', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
    });
    const timeStr = now.toLocaleTimeString('es-ES', {
      hour: '2-digit', minute: '2-digit',
    });

    const ranked = players.map((p, i) => ({
      ...p,
      index: i,
      totalSF: playerTotal(i),
      grossT: playerGrossTotal(i),
      netT: playerNetTotal(i),
    })).sort((a, b) => b.totalSF - a.totalSF);

    // ── Header ──
    let html = `
      <div class="exp-header">
        <img src="${LOGO_SRC}" alt="Logo" style="width:70px;height:70px;border-radius:14px;margin-bottom:10px;object-fit:contain;">
        <h2>🏌️‍♂️ ${escHtml(course.name)}</h2>
        <p>${escHtml(course.tees)} · Par ${course.totalPar} · Stableford</p>
      </div>`;

    // ── Player Summary Cards ──
    html += `<div class="exp-summary">`;
    ranked.forEach((p, rank) => {
      const medal = rank === 0 ? '🥇' : rank === 1 ? '🥈' : rank === 2 ? '🥉' : '';
      html += `
        <div class="exp-summary-card${rank === 0 ? ' leader' : ''}">
          <div class="exp-player-name">${medal} ${escHtml(p.name)}</div>
          <div class="exp-player-hcp">HCP ${p.courseHandicap}</div>
          <div class="exp-total-val">${p.totalSF} <span style="font-size:12px;color:#94a3b8;">pts</span></div>
          <div class="exp-total-row">
            <div><span class="exp-total-label">Gross</span><br><strong>${p.grossT !== null ? p.grossT : '—'}</strong></div>
            <div><span class="exp-total-label">Net</span><br><strong>${p.netT !== null ? p.netT : '—'}</strong></div>
          </div>
        </div>`;
    });
    html += `</div>`;

    // ── Scorecard per player ──
    ranked.forEach((p) => {
      html += `<div class="exp-scorecard">`;
      html += `<div class="exp-scorecard-title">${escHtml(p.name)} · HCP ${p.courseHandicap}</div>`;
      html += `<table>`;
      // Header row
      html += `<thead><tr>
        <th></th>
        ${Array.from({length:18}, (_,i) => `<th>${i+1}</th>`).join('')}
        <th>OUT</th><th>IN</th><th>TOT</th>
      </tr></thead><tbody>`;

      // Par row
      html += `<tr><td style="font-weight:700;text-align:left;padding-left:6px;">Par</td>`;
      for (let i = 0; i < 18; i++) {
        html += `<td class="td-par">${course.holes[i].par}</td>`;
      }
      const parOut = course.holes.slice(0,9).reduce((s,h) => s+h.par, 0);
      const parIn = course.holes.slice(9,18).reduce((s,h) => s+h.par, 0);
      html += `<td class="td-section">${parOut}</td><td class="td-section">${parIn}</td><td class="td-section">${course.totalPar}</td></tr>`;

      // SI row
      html += `<tr><td style="font-weight:700;text-align:left;padding-left:6px;">HCP</td>`;
      for (let i = 0; i < 18; i++) {
        html += `<td class="td-si">${course.holes[i].strokeIndex}</td>`;
      }
      html += `<td></td><td></td><td></td></tr>`;

      // Strokes received
      html += `<tr><td style="font-weight:600;text-align:left;padding-left:6px;color:#22c55e;">Golpes</td>`;
      let strOut = 0, strIn = 0;
      for (let i = 0; i < 18; i++) {
        const sr = strokesOnHole(p.courseHandicap, course.holes[i].strokeIndex);
        if (i < 9) strOut += sr; else strIn += sr;
        html += `<td class="td-strokes">${sr > 0 ? sr : '·'}</td>`;
      }
      html += `<td class="td-section">${strOut}</td><td class="td-section">${strIn}</td><td class="td-section">${Math.round(p.courseHandicap)}</td></tr>`;

      // Gross score row
      html += `<tr style="border-top:2px solid #e2e8f0;"><td style="font-weight:700;text-align:left;padding-left:6px;">Gross</td>`;
      let grossOut = 0, grossIn = 0, grossCntOut = 0, grossCntIn = 0;
      for (let i = 0; i < 18; i++) {
        const g = (p.scores && p.scores[i] != null) ? p.scores[i] : null;
        if (g !== null && g !== -1) {
          if (i < 9) { grossOut += g; grossCntOut++; }
          else { grossIn += g; grossCntIn++; }
        }
        html += `<td class="td-gross">${g === -1 ? '/' : (g !== null ? g : '—')}</td>`;
      }
      html += `<td class="td-section">${grossCntOut > 0 ? grossOut : '—'}</td>`;
      html += `<td class="td-section">${grossCntIn > 0 ? grossIn : '—'}</td>`;
      html += `<td class="td-section">${(grossCntOut + grossCntIn) > 0 ? grossOut + grossIn : '—'}</td></tr>`;

      // Net score row
      html += `<tr><td style="font-weight:700;text-align:left;padding-left:6px;color:#3b82f6;">Net</td>`;
      let netOut = 0, netIn = 0, netCntOut = 0, netCntIn = 0;
      for (let i = 0; i < 18; i++) {
        const g = (p.scores && p.scores[i] != null) ? p.scores[i] : null;
        const n = (g !== null && g !== -1) ? netScore(g, p.courseHandicap, course.holes[i].strokeIndex) : null;
        if (n !== null) {
          if (i < 9) { netOut += n; netCntOut++; }
          else { netIn += n; netCntIn++; }
        }
        html += `<td class="td-net">${g === -1 ? '/' : (n !== null ? n : '—')}</td>`;
      }
      html += `<td class="td-section">${netCntOut > 0 ? netOut : '—'}</td>`;
      html += `<td class="td-section">${netCntIn > 0 ? netIn : '—'}</td>`;
      html += `<td class="td-section">${(netCntOut + netCntIn) > 0 ? netOut + netIn : '—'}</td></tr>`;

      // Stableford points row
      html += `<tr style="border-top:2px solid #e2e8f0;"><td style="font-weight:700;text-align:left;padding-left:6px;">Stableford</td>`;
      let sfOut = 0, sfIn = 0;
      for (let i = 0; i < 18; i++) {
        const g = (p.scores && p.scores[i] != null) ? p.scores[i] : null;
        const sf = (g === -1) ? 0 : (g !== null ? stablefordPoints(g, course.holes[i].par, p.courseHandicap, course.holes[i].strokeIndex) : null);
        if (sf !== null) {
          if (i < 9) sfOut += sf; else sfIn += sf;
        }
        const sfC = g === -1 ? 'sf-c-raya' : (sf === 5 ? 'sf-c5' : sf === 4 ? 'sf-c4' : sf === 3 ? 'sf-c3' :
                    sf === 2 ? 'sf-c2' : sf === 1 ? 'sf-c1' : sf === 0 ? 'sf-c0' : '');
        html += `<td class="td-sf ${sfC}">${g === -1 ? '/' : (sf !== null ? sf : '—')}</td>`;
      }
      html += `<td class="td-section">${sfOut}</td><td class="td-section">${sfIn}</td><td class="td-section" style="font-size:15px;color:#0f5c2e;">${sfOut + sfIn}</td></tr>`;

      html += `</tbody></table></div>`;
    });

    // ── Footer ──
    html += `
      <div class="exp-footer">
        <strong>${dateStr}</strong> · ${timeStr}<br>
        Real Club de Golf Lomas-Bosque · Stableford
      </div>`;

    return html;
  }

  async function exportToImage() {
    const container = document.getElementById('exportContainer');
    const btnExport = document.getElementById('btnExport');
    const btnFloat = document.getElementById('btnExportFloating');

    // Show loading state
    const origText = btnExport.textContent;
    btnExport.textContent = '⏳ Generando...';
    btnExport.disabled = true;
    if (btnFloat) btnFloat.style.opacity = '0.5';

    try {
      // Build the export HTML
      container.innerHTML = buildExportHTML();

      // Small delay for layout calculation
      await new Promise(r => setTimeout(r, 100));

      // Capture with html2canvas
      const canvas = await html2canvas(container, {
        backgroundColor: '#ffffff',
        scale: 2, // 2x for retina quality (~1500px wide)
        useCORS: true,
        logging: false,
      });

      // Generate download
      const now = new Date();
      const filename = `LomasBosque_Stableford_${
        now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${
        String(now.getDate()).padStart(2,'0')}_${
        String(now.getHours()).padStart(2,'0')}${
        String(now.getMinutes()).padStart(2,'0')}.png`;

      // Create download link
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 'image/png');

      // Also try sharing via Web Share API if available (mobile)
      // (fallback: just download)

      // Clean up container
      setTimeout(() => { container.innerHTML = ''; }, 500);
    } catch (err) {
      console.error('Export failed:', err);
      alert('Error al exportar la imagen: ' + err.message);
    } finally {
      btnExport.textContent = origText;
      btnExport.disabled = false;
      if (btnFloat) btnFloat.style.opacity = '1';
    }
  }

  // ═══════════════════════════════════
  //  INIT
  // ═══════════════════════════════════
  document.getElementById('headerLogo').src = LOGO_SRC;
  renderAll();
  </script>
